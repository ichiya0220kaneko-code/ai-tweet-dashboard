name: AI Tweet Dashboard - Daily Collection

on:
  schedule:
    # 毎朝6:00 JST (= UTC 21:00 前日)
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection script
        env:
          X_BEARER_TOKEN_1: ${{ secrets.X_BEARER_TOKEN_1 }}
          X_BEARER_TOKEN_2: ${{ secrets.X_BEARER_TOKEN_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py

      - name: Commit and push results
        run: |
          git config --global user.name "AI Dashboard Bot"
          git config --global user.email "bot@github.com"
          git add docs/index.html obsidian/
          git diff --staged --quiet || git commit -m "📊 AI Dashboard Update $(date +'%Y-%m-%d')"
          git push
